# Netlify deploy config for the Throttlr Themes gallery.
#
# The build command runs `node build-index.js` which scans the themes/
# folder and writes themes/_index.json — the single file the website
# fetches on page load to know which themes are available. Drop a new
# theme JSON+CSS into themes/, push, and Netlify regenerates the index
# automatically.

[build]
  publish = "."
  command = "node build-index.js"

# ===== Headers =====
# Don't cache the gallery page or the index — we want updates to
# propagate the moment a deploy finishes.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/themes/_index.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Theme files themselves can cache for a day — they don't change once published.
[[headers]]
  for = "/themes/*.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/themes/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Standard security headers — best practice for a static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"

# ===== Redirects =====
# Catch-all for unknown URLs → custom 404 page.
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
