# Netlify deploy config for the Throttlr Themes gallery.
# Static-only site — no build command needed.

[build]
  publish = "."
  # No build command; this is a hand-written static site.

# ===== Headers =====
# Cache the gallery page itself short (5 min) — we want gallery updates
# to propagate when new themes are merged. The browser-side localStorage
# cache (1 hour) takes care of GitHub API rate-limit protection.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Theme JSON files in this repo (if anyone ever links them directly from
# the deployed site instead of from GitHub) — long cache, themes don't
# change once published.
[[headers]]
  for = "/themes/*.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Standard security headers — best practice for a static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# ===== Redirects =====
# Catch-all for unknown URLs → custom 404 page.
[[redirects]]
  from = "/*"
  to   = "/404.html"
  status = 404
