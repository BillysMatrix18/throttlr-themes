<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0c0a"/>

  <!-- Hazard tape strips top + bottom -->
  <defs>
    <pattern id="tape" patternUnits="userSpaceOnUse" width="48" height="36" patternTransform="rotate(45)">
      <rect width="24" height="36" fill="#ffb800"/>
      <rect x="24" width="24" height="36" fill="#000"/>
    </pattern>
  </defs>
  <rect x="0" y="0"   width="1200" height="22" fill="url(#tape)"/>
  <rect x="0" y="608" width="1200" height="22" fill="url(#tape)"/>

  <!-- Brand mark (top-left) -->
  <rect x="60" y="60" width="56" height="56" fill="#ffb800"/>
  <text x="88" y="105" text-anchor="middle"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="44" font-weight="900"
        fill="#0c0c0a">T</text>
  <text x="135" y="100"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="36" font-weight="800"
        letter-spacing="2"
        fill="#e8e6d8">THROTTLR</text>
  <text x="335" y="100"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="36" font-weight="800"
        letter-spacing="2"
        fill="#ffb800">/THEMES</text>

  <!-- Eyebrow -->
  <text x="60" y="270"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="22" letter-spacing="6"
        fill="#ffb800">// COMMUNITY GALLERY</text>

  <!-- Big title -->
  <text x="60" y="380"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="120" font-weight="900"
        letter-spacing="-2"
        fill="#e8e6d8">Themes for</text>
  <text x="60" y="500"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="120" font-weight="900"
        letter-spacing="-2"
        fill="#ffb800">Throttlr.</text>

  <!-- Subtitle -->
  <text x="60" y="560"
        font-family="'Inter', sans-serif"
        font-size="22"
        fill="#aaa6a0">Free, community-made color schemes. Drop in, click apply.</text>
</svg>
